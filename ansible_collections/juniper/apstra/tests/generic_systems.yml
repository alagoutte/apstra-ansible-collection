---
# ═══════════════════════════════════════════════════════════════════
#  generic_systems test playbook
#
#  Run modes:
#     Standalone (creates & destroys its own blueprint):
#         make test-generic_systems
#         # or directly:
#         pipenv run ansible-playbook -v .../tests/generic_systems.yml
#
# ═══════════════════════════════════════════════════════════════════
- name: Test generic_systems CRUD operations
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    apstra_api_url: "{{ lookup('env', 'APSTRA_API_URL') }}"
    use_existing_blueprint: false
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_generic_systems_{{ local_hostname.stdout }}"
      when: not use_existing_blueprint | bool

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    # ══════════════════════════════════════════════════════════════════
    #  Blueprint Setup
    # ══════════════════════════════════════════════════════════════════

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"
      register: bp
      when: not use_existing_blueprint | bool

    - name: Show created blueprint
      ansible.builtin.debug:
        var: bp
      when: not use_existing_blueprint | bool

    - name: Set blueprint_id fact
      ansible.builtin.set_fact:
        blueprint_id: "{{ bp.id.blueprint }}"
      when: not use_existing_blueprint | bool

    - name: Show blueprint_id being used
      ansible.builtin.debug:
        msg: "Using blueprint_id={{ blueprint_id }}"

    # ── Discover leaves and spines via blueprint module ──────────────

    - name: Query system nodes (leaves and spines) via blueprint module
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        state: queried
        query_type: nodes_by_role
        roles:
          - leaf
          - spine
        auth_token: "{{ auth.token }}"
      register: system_nodes_qe
      when: not use_existing_blueprint | bool

    - name: Extract leaf and spine IDs from blueprint query
      ansible.builtin.set_fact:
        leaf_ids: >-
          {{ system_nodes_qe.nodes | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.id') | list }}
        spine_ids: >-
          {{ system_nodes_qe.nodes | dict2items
             | selectattr('value.role', 'equalto', 'spine')
             | map(attribute='value.id') | list }}
        leaf_labels: >-
          {{ system_nodes_qe.nodes | dict2items
             | selectattr('value.role', 'equalto', 'leaf')
             | map(attribute='value.label') | list }}
      when: not use_existing_blueprint | bool

    - name: Display discovered nodes
      ansible.builtin.debug:
        msg: "Found {{ leaf_ids | length }} leaves: {{ leaf_ids }}, {{ spine_ids | length }} spines: {{ spine_ids }}"
      when: not use_existing_blueprint | bool

    # ── Query design interface maps via design module ────────────────

    - name: Query all design interface maps
      juniper.apstra.design:
        id:
          design_type: interface_map
          name: all
        state: queried
        auth_token: "{{ auth.token }}"
      register: all_imaps
      no_log: true
      when: not use_existing_blueprint | bool

    # ── Discover leaf logical device and find matching interface map ──

    - name: Get leaf logical device from blueprint
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        query: >-
          node('system', id='{{ leaf_ids[0] }}', name='sys')
          .out('logical_device')
          .node('logical_device', name='ld')
        state: queried
        auth_token: "{{ auth.token }}"
      register: leaf_ld_qe
      when: not use_existing_blueprint | bool

    - name: Extract leaf logical device ID
      ansible.builtin.set_fact:
        leaf_ld_id: "{{ leaf_ld_qe.results[0]['ld']['label'] | regex_replace('_v\\d+$', '') }}"
      when: not use_existing_blueprint | bool

    - name: Find matching leaf interface map
      ansible.builtin.set_fact:
        leaf_imap_id: >-
          {{ (all_imaps.design_items
            | selectattr('logical_device_id', 'equalto', leaf_ld_id)
            | selectattr('id', 'match', '(?i)juniper|vqfx')
            | list | default(
              all_imaps.design_items
                | selectattr('logical_device_id', 'equalto', leaf_ld_id)
                | list, true)
              | first).id }}
      when: not use_existing_blueprint | bool

    - name: Display chosen leaf interface map
      ansible.builtin.debug:
        msg: "Leaf logical device={{ leaf_ld_id }}, interface map={{ leaf_imap_id }}"
      when: not use_existing_blueprint | bool

    # ── Discover spine logical device and find matching interface map ──

    - name: Get spine logical device from blueprint
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        query: >-
          node('system', id='{{ spine_ids[0] }}', name='sys')
          .out('logical_device')
          .node('logical_device', name='ld')
        state: queried
        auth_token: "{{ auth.token }}"
      register: spine_ld_qe
      when: not use_existing_blueprint | bool

    - name: Extract spine logical device ID
      ansible.builtin.set_fact:
        spine_ld_id: "{{ spine_ld_qe.results[0]['ld']['label'] | regex_replace('_v\\d+$', '') }}"
      when: not use_existing_blueprint | bool

    - name: Find matching spine interface map
      ansible.builtin.set_fact:
        spine_imap_id: >-
          {{ (all_imaps.design_items
            | selectattr('logical_device_id', 'equalto', spine_ld_id)
            | selectattr('id', 'match', '(?i)juniper|vqfx')
            | list | default(
              all_imaps.design_items
                | selectattr('logical_device_id', 'equalto', spine_ld_id)
                | list, true)
              | first).id }}
      when: not use_existing_blueprint | bool

    - name: Display chosen spine interface map
      ansible.builtin.debug:
        msg: "Spine logical device={{ spine_ld_id }}, interface map={{ spine_imap_id }}"
      when: not use_existing_blueprint | bool

    # ── Assign interface maps to leaf and spine via module ────────────

    - name: Build interface map assignments dict
      ansible.builtin.set_fact:
        imap_assignments: "{{ {leaf_ids[0]: leaf_imap_id, spine_ids[0]: spine_imap_id} }}"
      when: not use_existing_blueprint | bool

    - name: Assign interface maps to test leaf and spine
      juniper.apstra.interface_map:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          assignments: "{{ imap_assignments }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: imap_result
      when: not use_existing_blueprint | bool

    - name: Display interface map assignment result
      ansible.builtin.debug:
        msg: "Interface maps assigned. Changed: {{ imap_result.changed | default(false) }}"
      when: not use_existing_blueprint | bool

    # ── Discover spine interfaces for external GS tests ──────────────

    - name: Query all interfaces on test spine
      juniper.apstra.blueprint:
        id:
          blueprint: "{{ blueprint_id }}"
        query: >-
          node('system', id='{{ spine_ids[0] }}', name='sys')
          .out('hosted_interfaces')
          .node('interface', name='intf')
        state: queried
        auth_token: "{{ auth.token }}"
      register: spine_all_intf_qe
      when: not use_existing_blueprint | bool

    - name: Extract physical interface names on spine
      ansible.builtin.set_fact:
        spine_phys_if_names: >-
          {{ spine_all_intf_qe.results
             | map(attribute='intf')
             | map(attribute='if_name')
             | select('match', '^(ge|xe|et)-')
             | list }}
      when: not use_existing_blueprint | bool

    - name: Compute spine interface prefix and max used port
      ansible.builtin.set_fact:
        spine_if_prefix: >-
          {{ (spine_phys_if_names | first | regex_replace('[^/]+$', ''))
             if spine_phys_if_names | length > 0 else 'xe-0/0/' }}
        spine_max_port: >-
          {{ spine_phys_if_names
             | map('regex_replace', '^.*/', '')
             | map('int')
             | max | default(-1) | int }}
      when: not use_existing_blueprint | bool

    # ── Set test variables based on run mode ──────────────────────────

    - name: Set test variables (standalone mode - vQFX defaults)
      ansible.builtin.set_fact:
        test_leaf_id: "{{ leaf_ids[0] }}"
        test_if_name_1: "xe-0/0/7"
        test_if_name_2: "xe-0/0/8"
        test_if_name_3: "xe-0/0/9"
        test_if_name_4: "xe-0/0/10"
        test_if_transform_id: 1
        test_spine_id: "{{ spine_ids[0] }}"
        test_spine_if_1: "{{ spine_if_prefix | trim }}{{ spine_max_port | int + 1 }}"
      when: not use_existing_blueprint | bool

    - name: Set test variables (existing blueprint mode - user-provided)
      ansible.builtin.set_fact:
        test_leaf_id: "{{ leaf_switch_id }}"
        test_if_name_1: "{{ if_name_1 }}"
        test_if_name_2: "{{ if_name_2 }}"
        test_if_name_3: "{{ if_name_3 }}"
        test_if_name_4: "{{ if_name_4 }}"
        test_if_transform_id: "{{ if_transform_id }}"
      when: use_existing_blueprint | bool

    - name: Display test variables
      ansible.builtin.debug:
        msg: >-
          leaf={{ test_leaf_id }},
          if1={{ test_if_name_1 }}, if2={{ test_if_name_2 }},
          if3={{ test_if_name_3 }}, if4={{ test_if_name_4 }},
          spine={{ test_spine_id }},
          spine_if1={{ test_spine_if_1 }},
          transform={{ test_if_transform_id }}

    # ══════════════════════════════════════════════════════════════════
    #  Cleanup stale single-link GS from prior failed runs
    # ══════════════════════════════════════════════════════════════════

    - name: "Cleanup stale GS (test-gs-tf-001-updated) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-tf-001-updated"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    - name: "Cleanup stale GS (test-gs-tf-001) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-tf-001"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    # ══════════════════════════════════════════════════════════════════
    #  TEST 1: Create generic system with a single link
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 1 - Create generic system with a single link"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-tf-001"
          hostname: "test-gs-tf-001"
          tags:
            - "server"
            - "test"
          deploy_mode: "deploy"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              tags:
                - "10G"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_create

    - name: Display created generic system
      ansible.builtin.debug:
        var: gs_create

    - name: Verify generic system was created
      ansible.builtin.assert:
        that:
          - gs_create.changed
          - gs_create.system_id is defined
          - gs_create.blueprint_id == blueprint_id
          - gs_create.links | length > 0
          - gs_create.msg == "generic system created successfully"
        fail_msg: "TEST 1 FAILED: Generic system creation"
        success_msg: "TEST 1 PASSED: Generic system created"

    - name: Save system ID
      ansible.builtin.set_fact:
        gs_system_id: "{{ gs_create.system_id }}"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 2: Create idempotency (same name should not change)
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 2 - Create same generic system again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-tf-001"
          hostname: "test-gs-tf-001"
          tags:
            - "server"
            - "test"
          deploy_mode: "deploy"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              tags:
                - "10G"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_create_idem

    - name: Display create idempotency result
      ansible.builtin.debug:
        var: gs_create_idem

    - name: Verify create idempotency
      ansible.builtin.assert:
        that:
          - not gs_create_idem.changed
        fail_msg: "TEST 2 FAILED: Create idempotency"
        success_msg: "TEST 2 PASSED: Create idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 3: Update hostname and name
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 3 - Update generic system hostname and name"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        body:
          name: "test-gs-tf-001-updated"
          hostname: "test-gs-tf-001-updated"
          tags:
            - "server"
            - "test"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_update

    - name: Display update result
      ansible.builtin.debug:
        var: gs_update

    - name: Verify generic system was updated
      ansible.builtin.assert:
        that:
          - gs_update.changed
          - gs_update.changes is defined
          - gs_update.hostname == "test-gs-tf-001-updated"
          - gs_update.name == "test-gs-tf-001-updated"
        fail_msg: "TEST 3 FAILED: Generic system update"
        success_msg: "TEST 3 PASSED: Generic system updated"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 4: Update idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 4 - Update with same values (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        body:
          name: "test-gs-tf-001-updated"
          hostname: "test-gs-tf-001-updated"
          tags:
            - "server"
            - "test"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_update_idem

    - name: Display update idempotency result
      ansible.builtin.debug:
        var: gs_update_idem

    - name: Verify update idempotency
      ansible.builtin.assert:
        that:
          - not gs_update_idem.changed
        fail_msg: "TEST 4 FAILED: Update idempotency"
        success_msg: "TEST 4 PASSED: Update idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 5: Update deploy mode
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 5 - Change deploy mode to ready"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        body:
          deploy_mode: "ready"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_deploy_mode

    - name: Display deploy mode update result
      ansible.builtin.debug:
        var: gs_deploy_mode

    - name: Verify deploy mode was updated
      ansible.builtin.assert:
        that:
          - gs_deploy_mode.changed
          - gs_deploy_mode.deploy_mode == "ready"
        fail_msg: "TEST 5 FAILED: Deploy mode update"
        success_msg: "TEST 5 PASSED: Deploy mode updated to ready"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 6: Update tags
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 6 - Update tags"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        body:
          tags:
            - "server"
            - "test"
            - "updated"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_tags_update

    - name: Display tags update result
      ansible.builtin.debug:
        var: gs_tags_update

    - name: Verify tags were updated
      ansible.builtin.assert:
        that:
          - gs_tags_update.changed
          - "'updated' in gs_tags_update.tags"
        fail_msg: "TEST 6 FAILED: Tags update"
        success_msg: "TEST 6 PASSED: Tags updated"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 7: Delete generic system
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 7 - Delete generic system"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: gs_delete

    - name: Display delete result
      ansible.builtin.debug:
        var: gs_delete

    - name: Verify generic system was deleted
      ansible.builtin.assert:
        that:
          - gs_delete.changed
        fail_msg: "TEST 7 FAILED: Generic system deletion"
        success_msg: "TEST 7 PASSED: Generic system deleted"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 8: Delete idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 8 - Delete same system again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_system_id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: gs_delete_idem

    - name: Display delete idempotency result
      ansible.builtin.debug:
        var: gs_delete_idem

    - name: Verify delete idempotency
      ansible.builtin.assert:
        that:
          - not gs_delete_idem.changed
        fail_msg: "TEST 8 FAILED: Delete idempotency"
        success_msg: "TEST 8 PASSED: Delete idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 8b: Name Resolution — create GS using leaf label
    # ══════════════════════════════════════════════════════════════════

    - name: "Cleanup stale name-res GS if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-name-res"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true
      when: not use_existing_blueprint | bool

    - name: "TEST 8b - Create GS using leaf label (name resolution)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-name-res"
          hostname: "test-gs-name-res"
          links:
            - target_switch_id: "{{ leaf_labels[0] }}"
              target_switch_if_name: "{{ test_if_name_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_name_res
      when: not use_existing_blueprint | bool

    - name: Verify GS created with leaf label resolution
      ansible.builtin.assert:
        that:
          - gs_name_res is not failed
          - gs_name_res.system_id is defined
        fail_msg: "TEST 8b FAILED: Leaf label resolution in generic_systems"
        success_msg: "TEST 8b PASSED: GS created using leaf label"
      when: not use_existing_blueprint | bool

    - name: Delete name-resolved GS
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ gs_name_res.system_id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      when: not use_existing_blueprint | bool

    # ══════════════════════════════════════════════════════════════════
    #  Cleanup stale LAG GS from prior failed runs
    # ══════════════════════════════════════════════════════════════════

    - name: "Cleanup stale LAG GS (test-lag-server-tf) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-lag-server-tf"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    # ══════════════════════════════════════════════════════════════════
    #  TEST 9: Create generic system with dual LAG links
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 9 - Create generic system with dual LAG links"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-lag-server-tf"
          hostname: "test-lag-server-tf"
          tags:
            - "server"
            - "lag"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_2 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
              tags: ["10G", "bond0"]
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_3 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
              tags: ["10G", "bond0"]
        state: present
        auth_token: "{{ auth.token }}"
      register: lag_gs_create

    - name: Display LAG generic system result
      ansible.builtin.debug:
        var: lag_gs_create

    - name: Verify LAG generic system was created
      ansible.builtin.assert:
        that:
          - lag_gs_create.changed
          - lag_gs_create.links | length == 2
          - lag_gs_create.system_id is defined
        fail_msg: "TEST 9 FAILED: LAG generic system creation"
        success_msg: "TEST 9 PASSED: LAG generic system created with 2 links"

    - name: Save LAG system ID
      ansible.builtin.set_fact:
        lag_system_id: "{{ lag_gs_create.system_id }}"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 10: LAG create idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 10 - Create same LAG system again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-lag-server-tf"
          hostname: "test-lag-server-tf"
          tags:
            - "server"
            - "lag"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_2 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
              tags: ["10G", "bond0"]
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_3 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
              tags: ["10G", "bond0"]
        state: present
        auth_token: "{{ auth.token }}"
      register: lag_gs_idem

    - name: Verify LAG create idempotency
      ansible.builtin.assert:
        that:
          - not lag_gs_idem.changed
        fail_msg: "TEST 10 FAILED: LAG create idempotency"
        success_msg: "TEST 10 PASSED: LAG create idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 11: Delete LAG generic system
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 11 - Delete LAG generic system"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ lag_system_id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: lag_gs_delete

    - name: Display LAG delete result
      ansible.builtin.debug:
        var: lag_gs_delete

    - name: Verify LAG generic system was deleted
      ansible.builtin.assert:
        that:
          - lag_gs_delete.changed
        fail_msg: "TEST 11 FAILED: LAG generic system deletion"
        success_msg: "TEST 11 PASSED: LAG generic system deleted"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 11b: Create LAG GS with explicit port_channel_id_min/max
    # ══════════════════════════════════════════════════════════════════

    - name: "Cleanup stale port-channel GS (test-pc-id-gs-tf) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-pc-id-gs-tf"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    - name: "TEST 11b - Create LAG GS with port_channel_id_min=30 port_channel_id_max=30"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-pc-id-gs-tf"
          hostname: "test-pc-id-gs-tf"
          port_channel_id_min: 30
          port_channel_id_max: 30
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_2 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_3 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
        state: present
        auth_token: "{{ auth.token }}"
      register: pc_id_gs_create

    - name: Display port-channel GS create result
      ansible.builtin.debug:
        var: pc_id_gs_create

    - name: Verify port_channel_id_min and port_channel_id_max were honored on creation
      ansible.builtin.assert:
        that:
          - pc_id_gs_create.changed
          - pc_id_gs_create.system_id is defined
          - pc_id_gs_create.port_channel_id_min == 30
          - pc_id_gs_create.port_channel_id_max == 30
        fail_msg: >-
          TEST 11b FAILED: port_channel_id not set correctly on creation.
          Got min={{ pc_id_gs_create.port_channel_id_min }},
          max={{ pc_id_gs_create.port_channel_id_max }}, expected 30/30.
        success_msg: "TEST 11b PASSED: port_channel_id_min=30 and port_channel_id_max=30 honored at creation"

    - name: Save port-channel GS system ID
      ansible.builtin.set_fact:
        pc_id_system_id: "{{ pc_id_gs_create.system_id }}"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 11c: port_channel_id idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 11c - Create same port-channel GS again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-pc-id-gs-tf"
          hostname: "test-pc-id-gs-tf"
          port_channel_id_min: 30
          port_channel_id_max: 30
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_2 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_3 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              lag_mode: "lacp_active"
              group_label: "bond0"
        state: present
        auth_token: "{{ auth.token }}"
      register: pc_id_gs_idem

    - name: Verify port-channel GS create idempotency
      ansible.builtin.assert:
        that:
          - not pc_id_gs_idem.changed
          - pc_id_gs_idem.port_channel_id_min == 30
          - pc_id_gs_idem.port_channel_id_max == 30
        fail_msg: "TEST 11c FAILED: port_channel_id idempotency"
        success_msg: "TEST 11c PASSED: port_channel_id idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 11d: Update port_channel_id_min/max to new values
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 11d - Update port_channel_id_min/max to 40"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ pc_id_system_id }}"
        body:
          port_channel_id_min: 40
          port_channel_id_max: 40
        state: present
        auth_token: "{{ auth.token }}"
      register: pc_id_gs_update

    - name: Display port-channel GS update result
      ansible.builtin.debug:
        var: pc_id_gs_update

    - name: Verify port_channel_id was updated
      ansible.builtin.assert:
        that:
          - pc_id_gs_update.changed
          - pc_id_gs_update.port_channel_id_min == 40
          - pc_id_gs_update.port_channel_id_max == 40
        fail_msg: >-
          TEST 11d FAILED: port_channel_id update failed.
          Got min={{ pc_id_gs_update.port_channel_id_min }},
          max={{ pc_id_gs_update.port_channel_id_max }}, expected 40/40.
        success_msg: "TEST 11d PASSED: port_channel_id updated to 40/40"

    # - name: "TEST 11d cleanup - Delete port-channel GS"
    #   juniper.apstra.generic_systems:
    #     id:
    #       blueprint: "{{ blueprint_id }}"
    #       system_id: "{{ pc_id_system_id }}"
    #     state: absent
    #     auth_token: "{{ auth.token }}"

    # ══════════════════════════════════════════════════════════════════
    #  External GS: Clean up stale renamed GS from prior failed runs
    # ══════════════════════════════════════════════════════════════════

    - name: "Cleanup stale external GS (test-ext-gs-tf-updated) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-ext-gs-tf-updated"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    - name: "Cleanup stale external GS (test-ext-gs-tf) if present"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-ext-gs-tf"
        state: absent
        auth_token: "{{ auth.token }}"
      ignore_errors: true

    # ══════════════════════════════════════════════════════════════════
    #  TEST 12: Create external generic system
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 12 - Create external generic system linked to spine"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-ext-gs-tf"
          hostname: "test-ext-gs-tf"
          external: true
          links:
            - target_switch_id: "{{ test_spine_id }}"
              target_switch_if_name: "{{ test_spine_if_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              tags:
                - "10G"
        state: present
        auth_token: "{{ auth.token }}"
      register: ext_gs_create

    - name: Display external GS result
      ansible.builtin.debug:
        var: ext_gs_create

    - name: Verify external GS was created
      ansible.builtin.assert:
        that:
          - ext_gs_create.changed
          - ext_gs_create.system_id is defined
          - ext_gs_create.links | length > 0
        fail_msg: "TEST 12 FAILED: External GS creation"
        success_msg: "TEST 12 PASSED: External GS created with spine link"

    - name: Save external system ID
      ansible.builtin.set_fact:
        ext_system_id: "{{ ext_gs_create.system_id }}"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 13: External GS create idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 13 - Create same external GS again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-ext-gs-tf"
          hostname: "test-ext-gs-tf"
          external: true
          links:
            - target_switch_id: "{{ test_spine_id }}"
              target_switch_if_name: "{{ test_spine_if_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
              tags:
                - "10G"
        state: present
        auth_token: "{{ auth.token }}"
      register: ext_gs_idem

    - name: Verify external GS create idempotency
      ansible.builtin.assert:
        that:
          - not ext_gs_idem.changed
        fail_msg: "TEST 13 FAILED: External GS create idempotency"
        success_msg: "TEST 13 PASSED: External GS create idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 14: Update external GS hostname
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 14 - Update external GS hostname"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ ext_system_id }}"
        body:
          name: "test-ext-gs-tf-updated"
          hostname: "test-ext-gs-tf-updated"
        state: present
        auth_token: "{{ auth.token }}"
      register: ext_gs_update

    - name: Display external GS update result
      ansible.builtin.debug:
        var: ext_gs_update

    - name: Verify external GS was updated
      ansible.builtin.assert:
        that:
          - ext_gs_update.changed
          - ext_gs_update.hostname == "test-ext-gs-tf-updated"
        fail_msg: "TEST 14 FAILED: External GS update"
        success_msg: "TEST 14 PASSED: External GS updated"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 15: External GS update idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 15 - Update external GS with same values (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ ext_system_id }}"
        body:
          name: "test-ext-gs-tf-updated"
          hostname: "test-ext-gs-tf-updated"
        state: present
        auth_token: "{{ auth.token }}"
      register: ext_gs_update_idem

    - name: Verify external GS update idempotency
      ansible.builtin.assert:
        that:
          - not ext_gs_update_idem.changed
        fail_msg: "TEST 15 FAILED: External GS update idempotency"
        success_msg: "TEST 15 PASSED: External GS update idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 16: Delete external GS
    # ══════════════════════════════════════════════════════════════════

    - name: Pause before external GS delete (let Apstra settle)
      ansible.builtin.pause:
        seconds: 3

    - name: "TEST 16 - Delete external GS"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ ext_system_id }}"
        body:
          external: true
        state: absent
        auth_token: "{{ auth.token }}"
      register: ext_gs_delete
      retries: 3
      delay: 5
      until: ext_gs_delete is not failed

    - name: Display external GS delete result
      ansible.builtin.debug:
        var: ext_gs_delete

    - name: Verify external GS was deleted
      ansible.builtin.assert:
        that:
          - ext_gs_delete.changed
        fail_msg: "TEST 16 FAILED: External GS deletion"
        success_msg: "TEST 16 PASSED: External GS deleted"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 17: External GS delete idempotency
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 17 - Delete same external GS again (idempotency)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
          system_id: "{{ ext_system_id }}"
        body:
          external: true
        state: absent
        auth_token: "{{ auth.token }}"
      register: ext_gs_delete_idem

    - name: Verify external GS delete idempotency
      ansible.builtin.assert:
        that:
          - not ext_gs_delete_idem.changed
        fail_msg: "TEST 17 FAILED: External GS delete idempotency"
        success_msg: "TEST 17 PASSED: External GS delete idempotency - no change"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 18: Delete by name (no system_id provided)
    # ══════════════════════════════════════════════════════════════════

    - name: Create generic system for name-based deletion test
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-delete-by-name"
          hostname: "test-gs-delete-by-name"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_4 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: gs_for_name_delete

    - name: "TEST 18 - Delete generic system by name"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "test-gs-delete-by-name"
        state: absent
        auth_token: "{{ auth.token }}"
      register: gs_name_delete

    - name: Display name-based delete result
      ansible.builtin.debug:
        var: gs_name_delete

    - name: Verify name-based deletion
      ansible.builtin.assert:
        that:
          - gs_name_delete.changed
        fail_msg: "TEST 18 FAILED: Name-based deletion"
        success_msg: "TEST 18 PASSED: Generic system deleted by name"

    # ══════════════════════════════════════════════════════════════════
    #  TEST 19-20: Validation / Error handling
    # ══════════════════════════════════════════════════════════════════

    - name: "TEST 19 - Create without links or external (should fail)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "should-fail-no-links"
          hostname: "should-fail-no-links"
        state: present
        auth_token: "{{ auth.token }}"
      register: no_links_result
      ignore_errors: true

    - name: Verify missing links error
      ansible.builtin.assert:
        that:
          - no_links_result is failed
        fail_msg: "TEST 19 FAILED: Should have failed without links"
        success_msg: "TEST 19 PASSED: Missing links error caught"

    - name: "TEST 20 - Duplicate link endpoints (should fail)"
      juniper.apstra.generic_systems:
        id:
          blueprint: "{{ blueprint_id }}"
        body:
          name: "should-fail-dup-links"
          hostname: "should-fail-dup-links"
          links:
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
            - target_switch_id: "{{ test_leaf_id }}"
              target_switch_if_name: "{{ test_if_name_1 }}"
              target_switch_if_transform_id: "{{ test_if_transform_id }}"
        state: present
        auth_token: "{{ auth.token }}"
      register: dup_links_result
      ignore_errors: true

    - name: Verify duplicate link error
      ansible.builtin.assert:
        that:
          - dup_links_result is failed
        fail_msg: "TEST 20 FAILED: Should have failed with duplicate links"
        success_msg: "TEST 20 PASSED: Duplicate link error caught"

    # ══════════════════════════════════════════════════════════════════
    #  Cleanup
    # ══════════════════════════════════════════════════════════════════

    - name: Unlock the blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        lock_state: "unlocked"
        auth_token: "{{ auth.token }}"
      register: blueprint_unlock
      when: not use_existing_blueprint | bool

    - name: Show unlocked blueprint
      ansible.builtin.debug:
        var: blueprint_unlock
      when: not use_existing_blueprint | bool

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ bp.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: blueprint_delete
      when: not use_existing_blueprint | bool

    - name: Show deleted blueprint
      ansible.builtin.debug:
        var: blueprint_delete
      when: not use_existing_blueprint | bool

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
