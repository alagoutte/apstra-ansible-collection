---
- name: Test create/delete blueprint
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Get local hostname
      ansible.builtin.command: hostname
      register: local_hostname
      changed_when: false

    - name: Set blueprint name fact
      ansible.builtin.set_fact:
        blueprint_name: "test_blueprint_{{ local_hostname.stdout }}"

    - name: Connect to Apstra
      juniper.apstra.authenticate:
        logout: false
      register: auth

    - name: Create blueprint
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "freeform"
        lock_state: "locked"
        auth_token: "{{ auth.token }}"
      register: blueprint_create

    - name: Show created blueprint
      ansible.builtin.debug:
        var: blueprint_create

    - name: Create blueprint -- no change
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}"
          design: "freeform"
        lock_state: "ignore"
        auth_token: "{{ auth.token }}"

    - name: Commit the blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        lock_state: "ignore"
        state: committed
        auth_token: "{{ auth.token }}"
      register: blueprint_commit

    - name: Show committed blueprint
      ansible.builtin.debug:
        var: blueprint_commit

    - name: Unlock blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        lock_state: "unlocked"
        auth_token: "{{ auth.token }}"
      register: blueprint_unlock

    - name: Show unlocked blueprint
      ansible.builtin.debug:
        var: blueprint_unlock

    - name: Delete blueprint
      juniper.apstra.blueprint:
        id: "{{ blueprint_create.id }}"
        state: absent
        auth_token: "{{ auth.token }}"
      register: blueprint_delete

    - name: Show deleted blueprint
      ansible.builtin.debug:
        var: blueprint_delete

    # ── Template name resolution tests ────────────────────────────

    - name: Create blueprint using template display_name
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_template_name"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2 Virtual EVPN"
        auth_token: "{{ auth.token }}"
      register: bp_template_name

    - name: Show template-name blueprint
      ansible.builtin.debug:
        var: bp_template_name

    - name: Verify template name resolution
      ansible.builtin.assert:
        that:
          - bp_template_name.changed
          - bp_template_name.id.blueprint | length > 0
        fail_msg: "Blueprint creation with template display_name failed"
        success_msg: "PASSED: Blueprint created using template display name"

    - name: Delete template-name blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_template_name.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Create blueprint using template ID directly
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_template_id"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
        auth_token: "{{ auth.token }}"
      register: bp_template_id

    - name: Verify template ID pass-through
      ansible.builtin.assert:
        that:
          - bp_template_id.changed
          - bp_template_id.id.blueprint | length > 0
        fail_msg: "Blueprint creation with template ID failed"
        success_msg: "PASSED: Blueprint created using exact template ID"

    - name: Delete template-id blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_template_id.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Verify invalid template name fails gracefully
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_bad_template"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "NonExistentTemplate_12345"
        auth_token: "{{ auth.token }}"
      register: bp_bad_template
      ignore_errors: true

    - name: Verify bad template produced error
      ansible.builtin.assert:
        that:
          - bp_bad_template is failed
          - "'not found' in bp_bad_template.msg"
        fail_msg: "Invalid template should have failed with 'not found'"
        success_msg: "PASSED: Invalid template name correctly rejected"

    # ── node_updated: assignment (bulk label-based) tests ──────────────────

    - name: Create L2-EVPN blueprint for node_updated tests
      juniper.apstra.blueprint:
        body:
          label: "{{ blueprint_name }}_node_assign"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "L2_Virtual_EVPN"
        lock_state: ignore
        auth_token: "{{ auth.token }}"
      register: bp_assign

    - name: Query spine nodes by role
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        query_type: nodes_by_role
        roles:
          - spine
        auth_token: "{{ auth.token }}"
        state: queried
      register: spine_nodes

    - name: Show spine node labels
      ansible.builtin.debug:
        msg: "Spine labels: {{ spine_nodes.nodes.keys() | list }}"

    - name: Build assignment dict (spine label → fake serial)
      ansible.builtin.set_fact:
        spine_assignment: >-
          {{
            spine_assignment | default({}) | combine({
              item.key: 'FAKE_SERIAL_' ~ loop_idx
            })
          }}
      loop: "{{ spine_nodes.nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
        index_var: loop_idx

    - name: "Test assignment — bulk assign serials to all spine nodes"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment: "{{ spine_assignment }}"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_result

    - name: Verify assignment changed and nodes_updated contains all spines
      ansible.builtin.assert:
        that:
          - assign_result.changed
          - assign_result.nodes_updated.keys() | list | sort == spine_assignment.keys() | list | sort
          - assign_result.nodes_unchanged | length == 0
        fail_msg: "Bulk assignment failed: {{ assign_result }}"
        success_msg: "PASSED: Bulk assignment set serials on {{ assign_result.nodes_updated | length }} spine(s)"

    - name: "Test assignment — idempotent re-run (no change)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment: "{{ spine_assignment }}"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_idem

    - name: Verify idempotency (no change on second run)
      ansible.builtin.assert:
        that:
          - not assign_idem.changed
          - assign_idem.nodes_unchanged | length == spine_assignment | length
          - assign_idem.nodes_updated | length == 0
        fail_msg: "Assignment should be idempotent: {{ assign_idem }}"
        success_msg: "PASSED: Re-run correctly reported no changes"

    - name: "Test assignment — invalid label fails with clear error"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        assignment:
          nonexistent_node_xyz: "FAKE_SERIAL_999"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: assign_bad_label
      ignore_errors: true

    - name: Verify invalid label produces informative error
      ansible.builtin.assert:
        that:
          - assign_bad_label is failed
          - "'nonexistent_node_xyz' in assign_bad_label.msg"
        fail_msg: "Invalid label should fail with label name in error"
        success_msg: "PASSED: Invalid node label correctly rejected"

    - name: "Test node_id single-node path still works (regression)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        node_id: "{{ spine_nodes.nodes[spine_nodes.nodes.keys() | first].id }}"
        system_id: "SINGLE_NODE_SERIAL"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: single_node_result

    - name: Verify single-node path works
      ansible.builtin.assert:
        that:
          - single_node_result.changed
          - single_node_result.node is defined
        fail_msg: "Single-node node_id path broken: {{ single_node_result }}"
        success_msg: "PASSED: Single-node path (node_id) still works"

    # ── node_updated: rack rename tests ────────────────────────────

    - name: "Query all rack nodes in blueprint"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        query: "node('rack', name='rack')"
        state: queried
        auth_token: "{{ auth.token }}"
      register: rack_query

    - name: Show rack labels
      ansible.builtin.debug:
        msg: "Racks: {{ rack_query.results | map(attribute='rack') | map(attribute='label') | list }}"

    - name: Set first rack facts for rename tests
      ansible.builtin.set_fact:
        rack_original_label: "{{ rack_query.results[0].rack.label }}"
        rack_node_id: "{{ rack_query.results[0].rack.id }}"
        rack_new_label: "renamed-rack-1"

    - name: "TEST RACK-1 — Rename rack by current_label with node_type=rack"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "{{ rack_original_label }}"
        node_label: "{{ rack_new_label }}"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename

    - name: Verify rack was renamed
      ansible.builtin.assert:
        that:
          - rack_rename.changed
          - rack_rename.node.label == rack_new_label
        fail_msg: "Rack rename failed: {{ rack_rename }}"
        success_msg: "PASSED: Rack renamed from '{{ rack_original_label }}' to '{{ rack_new_label }}'"

    - name: "TEST RACK-2 — Idempotent rack rename (no change)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "{{ rack_new_label }}"
        node_label: "{{ rack_new_label }}"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename_idem

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - not rack_rename_idem.changed
        fail_msg: "Rack rename should be idempotent: {{ rack_rename_idem }}"
        success_msg: "PASSED: Rack rename idempotent — no change on re-run"

    - name: "TEST RACK-3 — Rename rack by node_id (UUID)"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        node_id: "{{ rack_node_id }}"
        node_label: "rack-by-uuid"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_rename_by_id

    - name: Verify rename by node_id
      ansible.builtin.assert:
        that:
          - rack_rename_by_id.changed
          - rack_rename_by_id.node.label == "rack-by-uuid"
        fail_msg: "Rack rename by node_id failed: {{ rack_rename_by_id }}"
        success_msg: "PASSED: Rack renamed via node_id to 'rack-by-uuid'"

    - name: "TEST RACK-4 — Rename rack back to original name"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        node_id: "{{ rack_node_id }}"
        node_label: "{{ rack_original_label }}"
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_restore

    - name: Verify restore
      ansible.builtin.assert:
        that:
          - rack_restore.changed
          - rack_restore.node.label == rack_original_label
        fail_msg: "Rack restore failed: {{ rack_restore }}"
        success_msg: "PASSED: Rack restored to original label '{{ rack_original_label }}'"

    - name: "TEST RACK-5 — Non-existent rack label with node_type fails"
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        current_label: "nonexistent_rack_xyz"
        node_label: "should-fail"
        node_type: rack
        state: node_updated
        auth_token: "{{ auth.token }}"
      register: rack_bad_label
      ignore_errors: true

    - name: Verify non-existent rack label produces clear error
      ansible.builtin.assert:
        that:
          - rack_bad_label is failed
          - "'nonexistent_rack_xyz' in rack_bad_label.msg"
          - "'rack' in rack_bad_label.msg"
        fail_msg: "Non-existent rack should fail with label in msg"
        success_msg: "PASSED: Non-existent rack label correctly rejected"

    - name: Delete node_updated test blueprint
      juniper.apstra.blueprint:
        id: "{{ bp_assign.id }}"
        state: absent
        auth_token: "{{ auth.token }}"

    - name: Logout of Apstra
      juniper.apstra.authenticate:
        logout: true
        auth_token: "{{ auth.token }}"
