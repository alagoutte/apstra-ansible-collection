---
# ═══════════════════════════════════════════════════════════════════════════════
# Create ConnectorOps Blueprint — Full End-to-End via Ansible Modules
# ═══════════════════════════════════════════════════════════════════════════════
#
# Creates a complete ConnectorOps blueprint (2 spine, 4 leaf, 4 host, 2 SRX)
# using native Ansible modules from the juniper.apstra collection.
#
# AOS credentials, device topology, wiring, and template are read from
# testbed.yaml — the same testbed format used by ConnectorOps CI/CD.
#
# Usage:
#   ansible-playbook tests/create_connectorops_blueprint.yml \
#       -e @tests/vars/connectorops_blueprint.yml \
#       -e testbed_file=/path/to/testbed.yaml
#
# Or via environment variable:
#   export TESTBED_FILE=/home/vgavini/ACS/testbed.yaml
#   ansible-playbook tests/create_connectorops_blueprint.yml \
#       -e @tests/vars/connectorops_blueprint.yml
#
# Phases:
#   0.  Load Testbed & Derive Variables
#   1.  Authentication
#   2.  Device Onboarding (system_agents)
#   2.5 Design Elements (logical devices, rack types, templates)
#   3.  Blueprint Creation
#   4.  Interface Map Assignment (interface_map)
#   5.  System ID Assignment (blueprint node_updated)
#   6.  Resource Pool Creation & Assignment
#   7.  First Deploy
#   8.  SRX External Router Setup (generic_systems)
#   9.  Remote Gateways (external_gateway)
#   10. Routing Policy
#   11. Fabric Settings (fabric_settings)
#   12. Connectivity Template + Assignment
#   13. Generic Link IP Assignment + Deploy
#   14. Security Zones
#   15. Virtual Networks
#   16. SZ Loopback IP Assignment
#   17. VN-to-Host Endpoint Policy
#   18. Deploy
#   19. Host Generic Systems (generic_systems with LAG)
#   20. Property Set
#   21. Configlet
#   22. Final Deploy
#
# ═══════════════════════════════════════════════════════════════════════════════

- name: Create ConnectorOps Blueprint
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    verify_certs: false

  tasks:
    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 0: Load Testbed & Derive Variables
    # ═══════════════════════════════════════════════════════════════════════════

    - name: "Phase 0a — Load testbed configuration"
      tags: [always]
      ansible.builtin.include_vars:
        file: "{{ testbed_file }}"
        name: testbed_raw

    - name: "Phase 0b — Set testbed shorthand"
      tags: [always]
      ansible.builtin.set_fact:
        tb: "{{ testbed_raw.testbeds.apstra.testbed1 }}"

    - name: "Phase 0c — Derive AOS credentials and topology from testbed"
      tags: [always]
      ansible.builtin.set_fact:
        aos_server: "{{ tb.aos.ip }}"
        aos_username: "{{ tb.aos.username }}"
        aos_password: "{{ tb.aos.password }}"
        api_url: "https://{{ tb.aos.ip }}/api"
        blueprint_label: "{{ topology_name }}"
        template_id: "{{ tb.topologies[topology_name].blueprint_template }}"
        device_username: "{{ tb.devices.username }}"
        device_password: "{{ tb.devices.password }}"
        topo: "{{ tb.topologies[topology_name] }}"

    - name: "Phase 0d — Build devices dict from testbed nodes"
      tags: [always]
      ansible.builtin.set_fact:
        devices: >-
          {{
            devices | default({}) | combine({
              item.key: {
                'mgmt_ip': tb.devices.devices_list[item.key].ip,
                'role': item.value.role
              }
            })
          }}
      loop: "{{ topo.nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: "Phase 0e — Build bp_hosts dict from testbed wiring + VN config"
      tags: [always]
      ansible.builtin.set_fact:
        bp_hosts: >-
          {{
            bp_hosts | default({}) | combine({
              item.key: host_vn_config[_suffix] | default({}) | combine({
                'leaf1_if': (item.value.eth1 | dict2items | first).value,
                'leaf2_if': (item.value.eth2 | dict2items | first).value
              })
            })
          }}
      loop: "{{ topo.hosts | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        _suffix: "{{ item.key | regex_replace('^' ~ topology_name ~ '-', '') }}"

    - name: "Phase 0f — Build SRX nodes dict from testbed + app config"
      tags: [always]
      ansible.builtin.set_fact:
        srx_nodes: >-
          {{
            srx_nodes | default({}) | combine({
              item.key: srx_config[_suffix] | default({}) | combine({
                'connections': item.value.connections
              })
            })
          }}
      loop: "{{ topo.unmanaged_nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        _suffix: "{{ item.key | regex_replace('^' ~ topology_name ~ '-', '') }}"

    # Phase 0g: Derive border_leaf_names from srx_nodes (available in Phase 0f).
    # Tagged always so it's available to any phase without needing phase6_external_gateway.
    - name: "Phase 0g — Derive border_leaf_names from SRX connections"
      tags: [always]
      ansible.builtin.set_fact:
        border_leaf_names: >-
          {{
            srx_nodes.values()
            | map(attribute='connections')
            | map('dict2items') | flatten
            | map(attribute='value')
            | map('dict2items') | flatten
            | map(attribute='key') | unique | list
          }}

    - name: Display derived configuration
      tags: [always]
      ansible.builtin.debug:
        msg: >-
          Testbed: {{ aos_server }} |
          Blueprint: {{ blueprint_label }} |
          Template: {{ template_id }} |
          Devices: {{ devices.keys() | list }} |
          Hosts: {{ bp_hosts.keys() | list }} |
          SRX: {{ srx_nodes.keys() | list }} |
          Border leaves: {{ border_leaf_names }}

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 1: Authentication
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 1 — Authenticate to Apstra"
      tags: [phase1_auth]
      juniper.apstra.authenticate:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        username: "{{ aos_username }}"
        password: "{{ aos_password }}"
        logout: false
      register: auth

    - name: Set auth token fact
      tags: [phase1_auth]
      ansible.builtin.set_fact:
        token: "{{ auth.token }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 2: Device Onboarding
    # Onboards each device as an offbox agent, triggers agent installation
    # (job_on_create: install), and waits up to 15 min for the agent container
    # to reach "connected" state before proceeding.
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 2 — Onboard devices and install agent"
      tags: [phase2_onboard]
      juniper.apstra.system_agents:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        body:
          management_ip: "{{ item.value.mgmt_ip }}"
          agent_type: "offbox"
          label: "{{ item.key }}"
          operation_mode: "full_control"
          platform: "junos"
          device_username: "{{ device_username }}"
          device_password: "{{ device_password }}"
          job_on_create: "install"
          wait_for_connection: true
          wait_timeout: 900
        state: present
      loop: "{{ devices | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: onboard_results

    # Collect agent info for system_id resolution later
    - name: Build agent ID map
      tags: [phase2_onboard]
      ansible.builtin.set_fact:
        agent_map: >-
          {{
            agent_map | default({}) | combine({
              item.item.key: {
                'agent_id': item.agent_id | default(''),
                'system_id': item.system_id | default('')
              }
            })
          }}
      loop: "{{ onboard_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.agent_id is defined

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 2a: Acknowledge / Approve Devices
    # After agent installation the devices appear in /api/systems as
    # OOS-QUARANTINED.  Approve each unacknowledged system so it becomes
    # OOS-READY and is available for blueprint assignment and deploy.
    # ═══════════════════════════════════════════════════════════════════════════

    - name: "Phase 2a — Acknowledge quarantined devices"
      tags: [phase2_onboard]
      juniper.apstra.system_agents:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        state: acknowledged
      register: ack_result

    - name: "Phase 2a — Display acknowledgement summary"
      tags: [phase2_onboard]
      ansible.builtin.debug:
        msg: "{{ ack_result.msg }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 2.5: Design Elements (Logical Devices, Rack Types, Templates)
    # ═══════════════════════════════════════════════════════════════════════════

    - name: "Phase 2.5a — Load design model definitions"
      tags: [phase3_design]
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/design_models.yml"

    - name: "Phase 2.5b — Create logical devices"
      tags: [phase3_design]
      juniper.apstra.design:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          design_type: logical_device
          name: "{{ item.key }}"
        body: "{{ item.value }}"
        state: present
      loop: "{{ logical_devices | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: ld_results

    - name: "Phase 2.5c — Create rack types"
      tags: [phase3_design]
      juniper.apstra.design:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          design_type: rack_type
          name: "{{ item.key }}"
        body: "{{ item.value }}"
        state: present
      loop: "{{ rack_types | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: rt_results

    - name: "Phase 2.5d — Create design templates"
      tags: [phase3_design]
      juniper.apstra.design:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          design_type: template
          name: "{{ item.key }}"
        body: "{{ item.value }}"
        state: present
      loop: "{{ design_templates | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: tm_results

    - name: Display design element results
      tags: [phase3_design]
      ansible.builtin.debug:
        msg: >-
          Logical Devices: {{ ld_results.results | map(attribute='id') | list }} |
          Rack Types: {{ rt_results.results | map(attribute='id') | list }} |
          Templates: {{ tm_results.results | map(attribute='id') | list }}

    # Override template_id to the actual Apstra template name we just created.
    # The testbed blueprint_template is the blueprint label, not the template name.
    - name: "Phase 2.5e — Set template_id to the first design template created"
      tags: [phase3_design]
      ansible.builtin.set_fact:
        template_id: "{{ (design_templates | dict2items | first).key }}"

    - name: "Phase 2.5f — Create interface maps"
      tags: [phase4_interface_maps]
      juniper.apstra.design:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          design_type: interface_map
          name: "{{ item.key }}"
        body: "{{ item.value }}"
        state: present
      loop: "{{ interface_maps | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: im_results

    - name: "Phase 2.5g — Display created interface maps"
      tags: [phase4_interface_maps]
      ansible.builtin.debug:
        msg: "Interface maps created: {{ im_results.results | map(attribute='id') | map(attribute='name') | list }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 3: Blueprint Creation
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 3 — Create blueprint: {{ blueprint_label }}"
      tags: [phase5_blueprint]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        body:
          label: "{{ blueprint_label }}"
          design: "two_stage_l3clos"
          init_type: "template_reference"
          template_id: "{{ template_id }}"
        lock_state: "ignore"
        state: present
      register: bp_result

    - name: Set blueprint_id fact
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        blueprint_id: "{{ bp_result.id.blueprint }}"

    - name: Display blueprint ID
      tags: [phase5_blueprint]
      ansible.builtin.debug:
        msg: "Blueprint created: {{ blueprint_id }}"

    # -- Token refresh (design + blueprint creation can be slow) ---------------
    - name: "Refresh auth token (before Phase 4)"
      tags: [phase5_blueprint]
      juniper.apstra.authenticate:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        username: "{{ aos_username }}"
        password: "{{ aos_password }}"
        logout: false
      register: auth

    - name: Update token fact
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        token: "{{ auth.token }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 4: Interface Map Assignment
    # ═══════════════════════════════════════════════════════════════════════════

    # Discover system nodes in the blueprint
    - name: "Phase 4 — Query system nodes (spine & leaf)"
      tags: [phase5_blueprint]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        state: queried
        query_type: nodes_by_role
        roles:
          - spine
          - leaf
      register: system_nodes_qe

    - name: Build node facts (label → id, role)
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        node_by_label: "{{ system_nodes_qe.nodes }}"

    # Name resolution: use node labels as keys and interface map labels as
    # values — the interface_map module resolves both to graph/API IDs.
    - name: Build interface map assignments dict (by label)
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        im_assignments: >-
          {{
            im_assignments | default({}) | combine({
              item.key: (item.value.role == 'spine') | ternary(spine_interface_map, leaf_interface_map)
            })
          }}
      loop: "{{ node_by_label | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Assign interface maps to all switch nodes
      tags: [phase5_blueprint]
      juniper.apstra.interface_map:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          assignments: "{{ im_assignments }}"
        state: present
      register: imap_result

    - name: Display interface map result
      tags: [phase5_blueprint]
      ansible.builtin.debug:
        msg: "Interface maps assigned. Changed: {{ imap_result.changed }}"

    # ─── Remap node_by_label: blueprint labels → testbed device names ─────────
    # Blueprint creates labels like "connectorops_vjun_001_leaf3" but the testbed
    # uses "vg-am-cops-tb-0-leaf3border".  We build a new node_by_label dict
    # keyed by full testbed device names so all subsequent phases work naturally.

    - name: "Phase 4.5a — Check if nodes are already testbed-named"
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        _nodes_already_named: >-
          {{ (topology_name ~ '-' ~ leaf_device_order[0]) in node_by_label }}
        _bp_nodes: "{{ node_by_label }}"

    - name: "Phase 4.5a — Discover rack prefix from blueprint labels (fresh blueprint)"
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        _rack_prefix: >-
          {{ (node_by_label.keys() | select('match', '.*_leaf1$') | first)
             | regex_replace('_leaf1$', '') }}
      when: not _nodes_already_named

    - name: "Phase 4.5b — Remap leaf nodes to testbed names"
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        _testbed_nodes: >-
          {{
            _testbed_nodes | default({}) | combine({
              (topology_name ~ '-' ~ item): _bp_nodes[_rack_prefix ~ '_leaf' ~ (idx + 1)]
            })
          }}
      loop: "{{ leaf_device_order }}"
      loop_control:
        index_var: idx
        label: "{{ item }}"
      when: not _nodes_already_named

    - name: "Phase 4.5c — Add spine mappings"
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        _testbed_nodes: >-
          {{
            _testbed_nodes | combine({
              (topology_name ~ '-' ~ item): _bp_nodes[item]
            })
          }}
      loop:
        - spine1
        - spine2
      when: not _nodes_already_named

    - name: "Phase 4.5d — Apply testbed-keyed node map"
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        node_by_label: "{{ _testbed_nodes }}"
      when: not _nodes_already_named

    - name: Display node label mapping
      tags: [phase5_blueprint]
      ansible.builtin.debug:
        msg: "node_by_label keys: {{ node_by_label.keys() | list }} | already_named: {{ _nodes_already_named }}"

    # ─── Rename leaf & spine nodes in the blueprint graph ─────────────────────
    # The FT's GetBorderleafLoopbacks() searches for "border" in the
    # hosting_system label. Blueprint-internal labels (e.g.
    # "connectorops_vjun_001_leaf3") lack this suffix, so we patch them
    # to match the testbed names (e.g. "vg-am-cops-tb-0-leaf3border").

    - name: "Phase 4.5e — Rename leaf/spine nodes in blueprint"
      tags: [phase5_blueprint]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        node_id: "{{ item.value.id }}"
        node_properties:
          label: "{{ item.key }}"
          hostname: "{{ item.key }}"
        state: node_updated
      loop: "{{ node_by_label | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: not _nodes_already_named

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 5: System ID Assignment
    # ═══════════════════════════════════════════════════════════════════════════

    # Get system agents to retrieve system_id (serial numbers)
    - name: "Phase 5 — Gather all system agents"
      tags: [phase5_blueprint]
      juniper.apstra.system_agents:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        state: gathered
      register: all_agents

    # Build a reverse mapping: management_ip → device_name from the devices dict.
    # Agents may have empty labels, so we match by management_ip instead.
    - name: Build IP-to-device name mapping
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        _ip_to_device: >-
          {{
            _ip_to_device | default({}) | combine({
              item.value.mgmt_ip: item.key
            })
          }}
      loop: "{{ devices | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Initialize device serial map
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        device_serial_map: {}

    - name: Build device serial map from agents (match by management_ip)
      tags: [phase5_blueprint]
      ansible.builtin.set_fact:
        device_serial_map: >-
          {{
            device_serial_map | combine({
              _ip_to_device[item.management_ip]: item.system_id
            })
          }}
      loop: "{{ all_agents.agents }}"
      loop_control:
        label: "{{ item.management_ip | default(item.agent_id) }}"
      when:
        - item.management_ip is defined
        - item.management_ip in _ip_to_device
        - item.system_id is defined
        - item.system_id | length > 0

    - name: Display device serial map
      tags: [phase5_blueprint]
      ansible.builtin.debug:
        var: device_serial_map

    # Build system_id assignments: map blueprint node label → serial
    # device_serial_map is already {node_label: serial}; after Phase 4.5e the
    # blueprint node labels match exactly so we can use bulk assignment directly.
    - name: "Phase 5 — Assign system_id + deploy_mode to blueprint nodes"
      tags: [phase5_blueprint]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        assignment: "{{ device_serial_map }}"
        deploy_mode: deploy
        state: node_updated
      when: device_serial_map | length > 0

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 6: Resource Pool Creation & Assignment
    # ═══════════════════════════════════════════════════════════════════════════

    - name: "Phase 6a — Create ASN pool"
      tags: [phase5_blueprint]
      juniper.apstra.resource_pools:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        type: asn
        body:
          display_name: "{{ asn_pool_name }}"
          ranges:
            - first: "{{ asn_range_first }}"
              last: "{{ asn_range_last }}"
        state: present
      register: asn_pool

    - name: "Phase 6b — Create IP pool (spine-leaf links)"
      tags: [phase5_blueprint]
      juniper.apstra.resource_pools:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        type: ip
        body:
          display_name: "{{ ip_pool_name }}"
          subnets:
            - network: "{{ ip_pool_subnet }}"
        state: present
      register: ip_pool

    - name: "Phase 6c — Assign ASN pool to spine ASNs"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "asn"
          group_name: "spine_asns"
        body:
          pool_ids:
            - "{{ asn_pool_name }}"
        state: present

    - name: "Phase 6d — Assign ASN pool to leaf ASNs"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "asn"
          group_name: "leaf_asns"
        body:
          pool_ids:
            - "{{ asn_pool_name }}"
        state: present

    - name: "Phase 6e — Assign IP pool to spine-leaf links"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "spine_leaf_link_ips"
        body:
          pool_ids:
            - "{{ ip_pool_name }}"
        state: present

    # Loopback IPs — use pool display_name directly (name resolution)
    - name: "Phase 6g — Assign loopback IPs to spines"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "spine_loopback_ips"
        body:
          pool_ids:
            - "{{ loopback_pool_name }}"
        state: present

    - name: "Phase 6h — Assign loopback IPs to leafs"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "leaf_loopback_ips"
        body:
          pool_ids:
            - "{{ loopback_pool_name }}"
        state: present

    - name: "Phase 6i — Create Loopback IPs - Generics resource group"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "generic_loopback_ips"
        body:
          pool_ids: []
        state: present

    - name: "Phase 6j — Create Generic ASNs resource group"
      tags: [phase5_blueprint]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "asn"
          group_name: "generic_asns"
        body:
          pool_ids: []
        state: present

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 7: First Deploy
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 7 — Deploy blueprint (first commit)"
      tags: [phase5_blueprint]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed
      register: deploy_1

    # -- Token refresh (Apstra tokens expire; re-auth before heavy phases) --
    - name: "Refresh auth token (before Phase 8)"
      tags: [phase6_external_gateway]
      juniper.apstra.authenticate:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        username: "{{ aos_username }}"
        password: "{{ aos_password }}"
        logout: false
      register: auth

    - name: Update token fact
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        token: "{{ auth.token }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 8: SRX External Router Setup (generic_systems)
    # ═══════════════════════════════════════════════════════════════════════════

    # The rack type already created SRX generic systems (host-5, host-6) with
    # correct links to border leafs.  We just need to update their properties:
    # rename, set ASN, loopback, deploy_mode, etc.

    # Query existing generic (server) systems in the blueprint
    - name: "Phase 8 prereq — Query generic systems"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        state: queried
        query_type: nodes_by_type
        system_type: server
      register: generic_nodes_qe

    - name: "Phase 8 prereq — Derive rack prefix from generic system labels"
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        _rack_prefix: >-
          {%- set _matches = generic_nodes_qe.nodes.keys()
              | select('search', '_sys[0-9]{3}$') | list -%}
          {%- if _matches -%}
            {{ _matches[0] | regex_replace('_sys[0-9]+$', '') }}
          {%- else -%}
            _no_sys_match
          {%- endif -%}
      when: _rack_prefix is not defined or _rack_prefix == ''

    - name: "Phase 8 prereq — Build SRX system ID mapping"
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        _srx_system_id_map: >-
          {{
            _srx_system_id_map | default({}) | combine({
              _full_name:
                generic_nodes_qe.nodes[_full_name].id
                if _full_name in generic_nodes_qe.nodes
                else generic_nodes_qe.nodes[_rack_prefix ~ '_sys' ~ '%03d' | format(item.value)].id
            })
          }}
      loop: "{{ srx_generic_indices | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        _full_name: "{{ topology_name ~ '-' ~ item.key }}"

    - name: "Phase 8 prereq — Build host system ID mapping"
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        _host_system_id_map: >-
          {{
            _host_system_id_map | default({}) | combine({
              _full_name:
                generic_nodes_qe.nodes[_full_name].id
                if _full_name in generic_nodes_qe.nodes
                else generic_nodes_qe.nodes[_rack_prefix ~ '_sys' ~ '%03d' | format(item.value)].id
            })
          }}
      loop: "{{ host_generic_indices | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        _full_name: "{{ topology_name ~ '-' ~ item.key }}"

    - name: Display generic system mappings
      tags: [phase6_external_gateway]
      ansible.builtin.debug:
        msg: "SRX: {{ _srx_system_id_map }} | Hosts: {{ _host_system_id_map }}"

    # Discover border leaf node IDs dynamically from SRX connections
    - name: "Phase 8a — Resolve border leaf names from SRX connections"
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        border_leaf_names: >-
          {{
            srx_nodes.values()
            | map(attribute='connections')
            | map('dict2items') | flatten
            | map(attribute='value')
            | map('dict2items') | flatten
            | map(attribute='key') | unique | list
          }}

    - name: "Phase 8a — Build border leaf ID list"
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        border_leaf_ids: >-
          {{
            border_leaf_names
            | map('extract', node_by_label)
            | map(attribute='id') | unique | list
          }}

    - name: "Phase 8b — Update SRX generic systems"
      tags: [phase6_external_gateway]
      juniper.apstra.generic_systems:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          system_id: "{{ _srx_system_id_map[item.key] }}"
        body:
          name: "{{ item.key }}"
          hostname: "{{ item.key }}"
          asn: "{{ item.value.asn }}"
          loopback_ipv4: "{{ item.value.loopback_ip }}"
          deploy_mode: "deploy"
          external: true
          tags:
            - "srx"
        state: present
      loop: "{{ srx_nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: srx_create_results

    - name: Build SRX system ID map
      tags: [phase6_external_gateway]
      ansible.builtin.set_fact:
        srx_system_ids: >-
          {{
            srx_system_ids | default({}) | combine({
              item.item.key: item.system_id | default('')
            })
          }}
      loop: "{{ srx_create_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: item.system_id is defined

    # -- Phase 8b.2: Query SRX interfaces and set if_name on each -----------
    # Name resolution: use label= instead of id= in graph QE query —
    # the SRX systems were just renamed in Phase 8b.
    - name: "Phase 8b.2 — Query SRX interfaces + links"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        query: 'node(type="system", label="{{ item.key }}", name="srx").out(type="hosted_interfaces").node(type="interface", if_type="ethernet", name="intf").out(type="link").node(type="link", name="lnk")'  # noqa: yaml[line-length]
        state: queried
      loop: "{{ srx_nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: _srx_intf_qe

    - name: "Phase 8b.2 — Set interface names on SRX generics"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        node_id: "{{ item.intf.id }}"
        node_properties:
          if_name: "{{ 'ge-0/0/0' if 'leaf1_link' in item.lnk.label else 'ge-0/0/1' }}"
        state: node_updated
      loop: >-
        {{ _srx_intf_qe.results
           | map(attribute='results')
           | flatten
           | list }}
      loop_control:
        label: "{{ item.srx.label }} {{ item.intf.id }} -> {{ 'ge-0/0/0' if 'leaf1_link' in item.lnk.label else 'ge-0/0/1' }}"

    # -- Phase 8d: Rename host generic systems to testbed names ---------------
    - name: "Phase 8d — Rename host generic systems"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        node_id: "{{ _host_system_id_map[item.key] }}"
        node_properties:
          label: "{{ item.key }}"
          hostname: "{{ item.key }}"
        state: node_updated
      loop: "{{ bp_hosts | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: "Phase 8c — Deploy after SRX + host setup"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 9: Remote Gateways (External Gateway)
    # ═══════════════════════════════════════════════════════════════════════════

    # Determine border leaf system IDs for local_gw_nodes
    - name: "Phase 9 — Create remote gateways"
      tags: [phase6_external_gateway]
      juniper.apstra.external_gateway:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          gw_name: "remote_gw_{{ item.key }}"
          gw_ip: "{{ item.value.loopback_ip | regex_replace('/\\d+$', '') }}"
          gw_asn: "{{ item.value.asn }}"
          local_gw_nodes: "{{ border_leaf_names }}"
          ttl: 30
          keepalive_timer: 10
          holdtime_timer: 30
          evpn_route_types: "type5_only"
        state: present
      loop: "{{ srx_nodes | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: "Phase 9a — Deploy after remote gateway setup"
      tags: [phase6_external_gateway]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 10: Routing Policy
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 10 — Create external router routing policy"
      tags: [phase7_connectivity_template]
      juniper.apstra.routing_policy:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          label: "{{ routing_policy_label }}"
          description: "Routing policy for SRX external routers"
          policy_type: "user_defined"
          import_policy: "all"
          expect_default_ipv4_route: false
          expect_default_ipv6_route: false
          export_policy:
            loopbacks: true
            spine_leaf_links: true
            l2edge_subnets: true
            spine_superspine_links: false
            static_routes: false
          extra_import_routes:
            - prefix: "{{ srx_loopback_prefix }}"
              action: "permit"
              le_mask: 32
            - prefix: "172.16.0.0/12"
              action: "deny"
              le_mask: 32
          extra_export_routes:
            - prefix: "{{ srx_loopback_prefix }}"
              action: "permit"
              le_mask: 32
            - prefix: "172.16.0.0/12"
              action: "deny"
              le_mask: 32
        state: present
      register: routing_policy

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 11: Fabric Settings
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 11 — Set external router MTU"
      tags: [phase7_connectivity_template]
      juniper.apstra.fabric_settings:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          external_router_mtu: "{{ external_router_mtu }}"
      register: fabric_result

    - name: "Phase 11b — Deploy after fabric settings"
      tags: [phase7_connectivity_template]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed

    # -- Token refresh before Phase 12 -----------------------------------------
    - name: "Refresh auth token (before Phase 12)"
      tags: [phase7_connectivity_template]
      juniper.apstra.authenticate:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        username: "{{ aos_username }}"
        password: "{{ aos_password }}"
        logout: false
      register: auth

    - name: Update token fact
      tags: [phase7_connectivity_template]
      ansible.builtin.set_fact:
        token: "{{ auth.token }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 12: Connectivity Template (BGP-2-SRX)
    # ═══════════════════════════════════════════════════════════════════════════

    # Security zone and routing policy are referenced by label — name
    # resolution in resolve_ct_primitives resolves them to graph node IDs.
    - name: "Phase 12b — Create BGP-2-SRX connectivity template"
      tags: [phase7_connectivity_template]
      juniper.apstra.connectivity_template:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          name: "BGP-2-SRX"
          type: interface
          description: "BGP peering to SRX external routers"
          primitives:
            ip_links:
              srx_link:
                interface_type: untagged
                security_zone: "default"
                ipv4_addressing_type: numbered
                ipv6_addressing_type: none
                bgp_peering_generic_systems:
                  bgp_peer:
                    bfd: true
                    ipv4_safi: true
                    ipv6_safi: false
                    ttl: 2
                    keepalive_timer: 10
                    holdtime_timer: 30
                    session_addressing_ipv4: addressed
                    session_addressing_ipv6: none
                    peer_from: interface
                    peer_to: interface_or_ip_endpoint
                    neighbor_asn_type: static
                    routing_policies:
                      rp_attach:
                        rp_to_attach: "{{ routing_policy_label }}"
        state: present
      register: ct_result

    # Discover SRX-facing interfaces on border leafs for CT assignment
    - name: "Phase 12c — Query SRX link interfaces"
      tags: [phase7_connectivity_template]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        state: queried
        query_type: interfaces_by_neighbor
        neighbor_labels: "{{ srx_nodes.keys() | list }}"
        neighbor_system_type: server
        local_role: leaf
        if_type: ethernet
      register: srx_links_qe

    - name: Build SRX interface IDs list
      tags: [phase7_connectivity_template]
      ansible.builtin.set_fact:
        srx_interface_ids: "{{ srx_links_qe.interface_ids }}"

    - name: Display SRX interface IDs for CT assignment
      tags: [phase7_connectivity_template]
      ansible.builtin.debug:
        msg: "Found {{ srx_interface_ids | length }} SRX-facing interfaces"

    # Name resolution: use ct_name (label) instead of ct_id (UUID)
    - name: "Phase 12d — Assign BGP-2-SRX CT to SRX interfaces"
      tags: [phase7_connectivity_template]
      juniper.apstra.connectivity_template_assignment:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          ct_name: "BGP-2-SRX"
        body:
          application_point_ids: "{{ srx_interface_ids }}"
        state: present
      when: srx_interface_ids | length > 0

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 13: Assign IP Pool to Generic Links + Deploy
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 13a — Assign IP pool to generic link IPs"
      tags: [phase7_connectivity_template]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "to_generic_link_ips"
        body:
          pool_ids:
            - "{{ ip_pool_name }}"
        state: present

    - name: "Phase 13b — Deploy after CT + resource assignment"
      tags: [phase7_connectivity_template]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed

    # ═══════════════════════════════════════════════════════════════════════════
    # Phases 14–18: Security Zones, Virtual Networks (with ESI expansion test)
    # ═══════════════════════════════════════════════════════════════════════════
    # NOTE: These phases create and keep security zones and virtual networks so
    # that the ESI pair expansion feature can be validated end-to-end.
    # The FT (TestConnectoropsPrerequisites) expects to find these resources
    # already present — it will skip creation if they already exist.
    # ═══════════════════════════════════════════════════════════════════════════

    # ─── Phase 14: Security Zones ─────────────────────────────────────────────
    - name: "Phase 14 — Create security zone: {{ item.key }}"
      tags: [phase14_sz]
      juniper.apstra.security_zone:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          label: "{{ item.key }}"
          sz_type: "evpn"
          vrf_name: "{{ item.key }}"
          vni_id: "{{ item.value.vni_id }}"
          vlan_id: "{{ item.value.vlan_id }}"
        state: present
      loop: "{{ security_zones | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: sz_results

    # ─── Phase 15: Virtual Networks — ESI expansion + global vlan_id ──────────
    # Tests two enhancements to the virtual_network module simultaneously:
    #   Feature 1 — global vlan_id: specified at body level, applied to all
    #               bound_to entries; not forwarded to the API as a VN attribute.
    #   Feature 2 — ESI pair expansion: a single redundancy_group label in
    #               bound_to.system_id is expanded to one entry per member leaf.
    # The ESI group label is discovered at runtime via the blueprint QE API so
    # the test is not hard-coded to any topology-specific name.

    - name: "Phase 15a — Discover ESI redundancy groups via apstra_facts"
      tags: [phase14_sz, phase15_vn]
      juniper.apstra.apstra_facts:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        gather_network_facts:
          - blueprints.nodes
        filter:
          blueprints.nodes: "node_type=redundancy_group"

    # Extract blueprint UUID from the apstra_facts result when blueprint_id was
    # not already set by phase5_blueprint (e.g. test-vn-regression partial run).
    - name: "Phase 15a.2 — Set blueprint_id from apstra_facts if not already set"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        blueprint_id: "{{ ansible_facts.apstra_facts.blueprints.keys() | list | first }}"
      when: blueprint_id is not defined

    - name: "Phase 15b — Set ESI pair label fact (first group found)"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        esi_pair_label: >-
          {{ (ansible_facts.apstra_facts.blueprints[blueprint_id].nodes
              | dict2items | first).value.label }}
      when: ansible_facts.apstra_facts.blueprints[blueprint_id].nodes | length > 0

    - name: "Phase 15b.2 — Warn when no ESI redundancy groups found (skip VN ESI test)"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.debug:
        msg: >-
          WARNING: No redundancy_group nodes found in blueprint '{{ blueprint_label }}'.
          This template may use MLAG or separate leaves instead of ESI — VN ESI expansion
          tasks will be skipped. Deploy the blueprint and connect devices to trigger ESI
          pair detection if this is unexpected.
      when: ansible_facts.apstra_facts.blueprints[blueprint_id].nodes | length == 0

    - name: "Phase 15c — Display discovered ESI pair"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.debug:
        msg: >-
          ESI redundancy group: '{{ esi_pair_label }}'
          — each VN bound_to entry will be expanded to its member leaves by the module.
      when: esi_pair_label is defined

    # Build the bound_to system list: ESI group (expands to leaf1/leaf2) + border leafs.
    # VNs must be bound to ALL leaf nodes so that IRB interfaces exist on every leaf
    # that needs to participate in EVPN routing — including the border leafs that peer
    # with the SRX external routers for inter-VRF (ConnectorOps) traffic.
    - name: "Phase 15c.2 — Init VN bound_to with ESI group entry"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        vn_esi_bound_to:
          - system_id: "{{ esi_pair_label }}"
      when: esi_pair_label is defined

    - name: "Phase 15c.2b — Append each border leaf to vn_esi_bound_to"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        vn_esi_bound_to: "{{ vn_esi_bound_to + [{'system_id': item}] }}"
      loop: "{{ border_leaf_names }}"
      when: esi_pair_label is defined

    - name: "Phase 15c.3 — Init fallback bound_to with leaf1 + leaf2 entries"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        vn_fallback_bound_to:
          - system_id: "{{ topology_name }}-leaf1"
          - system_id: "{{ topology_name }}-leaf2"
      when: esi_pair_label is not defined

    - name: "Phase 15c.3b — Append each border leaf to vn_fallback_bound_to"
      tags: [phase14_sz, phase15_vn]
      ansible.builtin.set_fact:
        vn_fallback_bound_to: "{{ vn_fallback_bound_to + [{'system_id': item}] }}"
      loop: "{{ border_leaf_names }}"
      when: esi_pair_label is not defined

    - name: "Phase 15d — Create virtual network with ESI expansion + global vlan_id: {{ item.key }}"
      tags: [phase15_vn]
      juniper.apstra.virtual_network:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          label: "{{ item.key }}"
          vn_type: "vxlan"
          vn_id: "{{ item.value.vn_id }}"
          security_zone_id: "{{ item.value.security_zone }}"
          ipv4_enabled: true
          virtual_gateway_ipv4_enabled: true
          ipv4_subnet: "{{ item.value.subnet }}"
          virtual_gateway_ipv4: "{{ item.value.gateway }}"
          vlan_id: "{{ item.value.vlan_id }}"   # global vlan_id: applied to every bound_to entry
          l3_mtu: "{{ item.value.l3_mtu }}"
          dhcp_service: "dhcpServiceDisabled"
          create_policy_untagged: true   # generate 'Untagged VxLAN' CT so FT can assign VN to host interfaces
          bound_to: "{{ vn_esi_bound_to }}"
          # bound_to includes: ESI group (expands to leaf1+leaf2) + border leafs (leaf3border, leaf4border)
          # All leaf nodes need the VN IRB so that ConnectorOps SRX-based inter-VRF routing works.
        state: present
      loop: "{{ virtual_networks | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: vn_results
      when: esi_pair_label is defined

    # Fallback: when no ESI redundancy groups exist, create VNs bound to
    # individual leaf nodes + border leafs.  This still validates the global vlan_id feature.
    - name: "Phase 15d.2 — Create VN with global vlan_id (no ESI, individual leaves): {{ item.key }}"
      tags: [phase15_vn]
      juniper.apstra.virtual_network:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          label: "{{ item.key }}"
          vn_type: "vxlan"
          vn_id: "{{ item.value.vn_id }}"
          security_zone_id: "{{ item.value.security_zone }}"
          ipv4_enabled: true
          virtual_gateway_ipv4_enabled: true
          ipv4_subnet: "{{ item.value.subnet }}"
          virtual_gateway_ipv4: "{{ item.value.gateway }}"
          vlan_id: "{{ item.value.vlan_id }}"   # global vlan_id: applied to all bound_to entries
          l3_mtu: "{{ item.value.l3_mtu }}"
          dhcp_service: "dhcpServiceDisabled"
          create_policy_untagged: true   # generate 'Untagged VxLAN' CT so FT can assign VN to host interfaces
          bound_to: "{{ vn_fallback_bound_to }}"
          # bound_to includes: leaf1 + leaf2 + border leafs (leaf3border, leaf4border)
        state: present
      loop: "{{ virtual_networks | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: vn_results_fallback
      when: esi_pair_label is not defined

    - name: "Phase 15e — Assert every VN has non-empty bound_to with correct vlan_id"
      tags: [phase15_vn]
      ansible.builtin.assert:
        that:
          - item.virtual_network.bound_to | length > 0
          - item.virtual_network.bound_to[0].vlan_id == (item.item.value.vlan_id | int)
        fail_msg: >-
          FAILED: VN '{{ item.virtual_network.label }}'
          bound_to={{ item.virtual_network.bound_to | length }} entries,
          vlan_id={{ item.virtual_network.bound_to[0].vlan_id | default('MISSING') }}.
          Expected vlan_id={{ item.item.value.vlan_id }}.
          {{ 'ESI expansion used.' if esi_pair_label is defined else 'Individual leaf binding used.' }}
        success_msg: >-
          PASSED: '{{ item.virtual_network.label }}'
          bound_to={{ item.virtual_network.bound_to | length }} entries,
          vlan_id={{ item.virtual_network.bound_to[0].vlan_id }} (global vlan_id confirmed).
          {{ '(ESI pair expanded to redundancy_group node).' if esi_pair_label is defined else '(individual leaf nodes merged by Apstra).' }}
      loop: >-
        {{
          vn_results.results
          if (esi_pair_label is defined and vn_results is defined)
          else vn_results_fallback.results
        }}
      loop_control:
        label: "{{ item.virtual_network.label | default(item.item.key) }}"
      when:
        - not (item.skipped | default(false))

    # ─────────────────────────────────────────────────────────────────────────
    # Phase 15f — Regression: customer-scenario VN with create_policy_tagged
    # ─────────────────────────────────────────────────────────────────────────
    # Reproduces the exact body a sales/customer environment used that previously
    # triggered a second untagged CT with an auto-assigned VLAN from the pool.
    # Fix (189d188): create_policy_untagged is no longer injected when
    # create_policy_tagged is explicitly True.
    #
    # Params mirrored from customer config:
    #   create_policy_tagged: true  — only a tagged CT should be created
    #   vlan_id: 254                — global VLAN applied to all bound_to entries
    #   virtual_gateway_ipv4        — L3 VN with gateway + subnet
    #   security_zone_id: green     — first SZ in this testbed (customer used "Tenant1")
    #   vn_id: "100110"             — customer's VN ID
    #   bound_to: all leaf nodes    — reuses ESI-expanded or fallback list from Phase 15c

    - name: "Phase 15f.1 — Customer-scenario VN: create with create_policy_tagged=true"
      tags: [phase15_vn, regression]
      juniper.apstra.virtual_network:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        body:
          label: "customer-test-vn"
          description: "Regression test — customer scenario with create_policy_tagged"
          ipv4_enabled: true
          virtual_gateway_ipv4: "10.100.10.1"
          ipv4_subnet: "10.100.10.0/24"
          virtual_gateway_ipv4_enabled: true
          create_policy_tagged: true   # must NOT inject create_policy_untagged
          vlan_id: 254
          vn_id: "100110"
          vn_type: "vxlan"
          security_zone_id: "green"   # matches customer's "Tenant1" SZ role
          bound_to: "{{ vn_esi_bound_to if esi_pair_label is defined else vn_fallback_bound_to }}"
        state: present
      register: customer_vn

    - name: "Phase 15f.2 — Assert customer VN created (changed=true, vlan_id=254)"
      tags: [phase15_vn, regression]
      ansible.builtin.assert:
        that:
          - customer_vn is not failed
          - customer_vn.changed
          - customer_vn.id.virtual_network is defined
          - customer_vn.virtual_network.bound_to | length > 0
          - customer_vn.virtual_network.bound_to[0].vlan_id == 254
        fail_msg: >-
          FAILED: customer-scenario VN (create_policy_tagged=true).
          changed={{ customer_vn.changed }},
          bound_to={{ customer_vn.virtual_network.bound_to | length }} entries,
          vlan_id={{ customer_vn.virtual_network.bound_to[0].vlan_id | default('MISSING') }}
        success_msg: >-
          PASSED: customer-scenario VN created (changed=true),
          bound_to={{ customer_vn.virtual_network.bound_to | length }} entries,
          vlan_id={{ customer_vn.virtual_network.bound_to[0].vlan_id }}
          (create_policy_tagged=true — no untagged CT injected).

    # Note: idempotency of bound_to with ESI group expansion + global vlan_id is
    # tested separately (see virtual_network.yml unit test, Phase 15d variants).
    # Here we only validate that the customer-scenario body creates the VN correctly.

    - name: "Phase 15f.3 — Cleanup: delete customer-scenario VN"
      tags: [phase15_vn, regression]
      juniper.apstra.virtual_network:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id: "{{ customer_vn.id }}"
        state: absent

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 16: SZ Loopback IP Pool Assignment
    # Each security zone requires a loopback IP pool assigned to its per-leaf
    # loopback resource group, or the blueprint commit will fail with
    # 'Loopback interface … missing IPv4 address' errors.
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 16 — Assign loopback IP pool to SZ: {{ item.item.key }}"
      tags: [phase14_sz, phase15_vn]
      juniper.apstra.resource_group:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
          group_type: "ip"
          group_name: "sz:{{ item.id.security_zone }},leaf_loopback_ips"
        body:
          pool_ids:
            - "{{ loopback_pool_name }}"
        state: present
      loop: "{{ sz_results.results }}"
      loop_control:
        label: "{{ item.item.key }}"

    # ═══════════════════════════════════════════════════════════════════════════
    # Phase 17: Deploy after SZ + VN configuration
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "Phase 17 — Commit blueprint after SZ, VN, and loopback pool assignment"
      tags: [phase14_sz, phase15_vn]
      juniper.apstra.blueprint:
        api_url: "{{ api_url }}"
        verify_certificates: "{{ verify_certs }}"
        auth_token: "{{ token }}"
        id:
          blueprint: "{{ blueprint_label }}"
        lock_state: "ignore"
        state: committed


    # Note: Host generic systems are auto-created by the template.
